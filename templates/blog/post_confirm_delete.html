{% extends 'base.html' %}

{% block title %}Confirmar Exclusão | Blog{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-6 text-center">
            <div class="card-soft p-5">
                <div class="bg-danger bg-opacity-10 text-danger rounded-circle p-3 d-inline-flex mb-3">
                    <i class="bi bi-exclamation-triangle-fill fs-1"></i>
                </div>
                
                <h2 class="h3 text-dark mb-2">Excluir Artigo?</h2>
                <p class="text-muted mb-4">
                    Tem certeza de que deseja excluir permanentemente o artigo <strong>"{{ object.title }}"</strong>? Esta ação não pode ser desfeita.
                </p>

                <form method="post">
                    {% csrf_token %}
                    <div class="d-flex justify-content-center gap-3">
                        <a href="{% url 'blog:post_detail' slug=object.slug %}" class="btn btn-light rounded-pill px-4">Cancelar</a>
                        <button type="submit" class="btn btn-danger rounded-pill px-4 fw-semibold">Sim, Excluir Artigo</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
